<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片转WORD (智能识别)</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="panel sidebar slide-up">
      <!-- Connection -->
      <section class="section">
        <h2>连接设置</h2>
        <div class="field">
          <label for="baseUrlInput">LM Studio Base URL</label>
          <input id="baseUrlInput" type="url" value="http://localhost:1234" placeholder="http://host:port">
        </div>
        <div class="field">
          <label for="modelSelect">模型</label>
          <div class="model-select" id="modelSelectRoot">
            <button id="modelSelectTrigger" type="button" class="model-select-trigger" aria-haspopup="listbox" aria-expanded="false">
              <span class="model-select-label" id="modelSelectLabel">请先检测连接以加载模型列表</span>
              <span class="model-select-caret" aria-hidden="true"></span>
            </button>
            <div id="modelSelectMenu" class="model-select-menu" role="listbox" aria-label="模型列表"></div>
            <input id="modelSelect" type="hidden" value="">
          </div>
        </div>
        <div class="field" style="margin-top: 12px; margin-bottom: 0;">
          <div class="row" style="flex-wrap: nowrap;">
            <button id="checkConnectionBtn" type="button" class="btn-primary" style="flex:1; min-width:0;">
              检测并加载模型
            </button>
            <button id="connectionStatusBtn" type="button" class="btn-status" aria-live="polite" tabindex="-1">
              未检测
            </button>
          </div>
        </div>
      </section>

      <!-- Image -->
      <section class="section">
        <h2>上传图片</h2>
        <label class="file-box" id="fileBox">
          <input id="imageInput" type="file" accept="image/*">
          <strong>选择图片</strong>
          <div class="preview" id="previewBox">
            <span class="muted">点击或拖拽图片到此处</span>
          </div>
        </label>
        <div class="row" style="margin-top: 14px;">
          <button class="btn-primary" id="recognizeBtn" type="button" style="flex:1;">
            开始识别
          </button>
          <button class="btn-danger" id="clearBtn" type="button" data-tooltip="清空所有内容">
            清空
          </button>
        </div>
      </section>
    </aside>

    <main class="panel main slide-up" style="animation-delay: 0.08s;">
      <section class="section table-section" id="tableSection">
        <div class="empty-panel">
          <div class="empty-icon">📋</div>
          <div class="empty-text">识别成功后，这里会按专业表格格式显示 JSON 数据。</div>
        </div>
      </section>

      <section class="output-section">
        <div class="output-split">
          <div class="output-pane output-image-pane">
            <div class="pane-title">上传图片</div>
            <div class="compare-stage" id="compareStage">
              <div class="preview" id="comparePreviewBox">
                <span class="compare-empty">等待上传图片。</span>
              </div>
            </div>
          </div>

          <div class="output-pane output-result-pane">
            <div class="pane-title">输出结果</div>
            <pre class="output-box" id="outputBox">等待识别结果。</pre>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
